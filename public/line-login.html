<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home BP — LINE Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  .hbp-bg {
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(99,102,241,0.28), transparent 60%),
      radial-gradient(900px 500px at 110% 20%, rgba(6,182,212,0.20), transparent 55%),
      linear-gradient(160deg, #05060a 0%, #0b1020 55%, #05060a 100%);
  }
  .hbp-card { background: rgba(17,20,32,0.72); backdrop-filter: blur(10px); }
</style>
<div class="min-h-screen hbp-bg flex flex-col text-slate-100">
  <header class="flex items-center justify-between px-5 py-3">
    <h1 class="font-semibold text-lg tracking-tight text-white" data-i18n="app_title_monitor"></h1>
    <button id="langToggle" onclick="toggleLang()" class="text-sm border border-white/20 rounded-lg px-3 py-1 hover:bg-white/10"></button>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm hbp-card rounded-2xl shadow-2xl border border-white/10 p-6 text-center">
      <h2 class="text-xl font-semibold mb-4" data-i18n="line_login_title"></h2>
      <p id="msg" class="text-sm text-slate-300" data-i18n="line_connecting"></p>
      <button id="lineBtn" class="hidden w-full mt-4 text-white rounded-lg px-4 py-2 font-medium hover:brightness-110" style="background:#06C755" data-i18n="line_login_btn"></button>
      <div class="mt-5">
        <a href="index.html" class="text-sm text-indigo-300 hover:underline" data-i18n="goto_login"></a>
      </div>
    </div>
  </main>
</div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script>
  const LIFF_ID = '2010745308-dTpWiHuY';
  document.addEventListener('DOMContentLoaded', renderFooter);
  window.onLangChange = () => { const f = document.getElementById('hbpFooter'); if (f) f.textContent = t('copyright'); };
  const msg = document.getElementById('msg');
  const setMsg = (key, cls) => { msg.className = 'text-sm ' + (cls || 'text-slate-300'); msg.removeAttribute('data-i18n'); msg.textContent = t(key); };

  (async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      // Not signed in -> LINE hands off to the LINE app via an iOS universal link.
      // iOS only honours that from a real user gesture, so calling liff.login()
      // straight from page load fails with universal_link_error / ACCOUNT_LOGIN_FAIL.
      // Show a button and call login() synchronously inside the tap handler (an
      // await in between would also discard the gesture).
      if (!liff.isLoggedIn()) {
        setMsg('line_tap_prompt', 'text-slate-300');
        const btn = document.getElementById('lineBtn');
        btn.classList.remove('hidden');
        btn.addEventListener('click', () => {
          // Canonical redirect target, so only one Callback URL needs whitelisting.
          liff.login({ redirectUri: 'https://homebp.netlify.app/line-login.html' });
        });
        return;
      }
      // Use the access token (LIFF keeps it fresh) rather than the ID token,
      // which LIFF caches without refreshing and is often expired on return.
      const accessToken = liff.getAccessToken();
      if (!accessToken) { setMsg('line_error', 'text-red-400'); return; }

      const r = await api('line-login', { access_token: accessToken });
      if (r.linked) {
        setSession(r.user, r.token);
        location.href = r.user.role === 'admin' ? 'admin.html' : r.user.role === 'master' ? 'master.html' : 'user.html';
      } else {
        // Not linked yet -> register first, then link on the completion screen.
        setMsg('line_not_linked', 'text-amber-400');
        setTimeout(() => { location.href = 'register.html'; }, 1200);
      }
    } catch (e) {
      msg.className = 'text-sm text-red-400';
      msg.removeAttribute('data-i18n');
      msg.textContent = (t('line_error') + ': ' + (e.message || e));
    }
  })();
</script>
