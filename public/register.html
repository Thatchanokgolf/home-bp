<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home BP — Register</title>
<script src="https://cdn.tailwindcss.com"></script>
<div class="min-h-screen bg-slate-100 flex flex-col">
  <header class="flex items-center justify-between px-5 py-3 bg-white shadow-sm">
    <h1 class="font-semibold text-indigo-700" data-i18n="app_title_monitor"></h1>
    <button id="langToggle" onclick="toggleLang()" class="text-sm border rounded-lg px-3 py-1 hover:bg-slate-50"></button>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow p-6 my-6">
      <h2 class="text-xl font-semibold mb-5 text-slate-800" data-i18n="register_title"></h2>
      <form id="regForm" class="space-y-3">
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="email_req"></label>
          <input id="email" type="email" class="w-full border rounded-lg px-3 py-2" />
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="username_label"></label>
          <input id="username" class="w-full border rounded-lg px-3 py-2" />
          <p class="text-xs text-slate-400 mt-1" data-i18n="username_help"></p>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-600 mb-1" data-i18n="fname_th"></label>
            <input id="first_name" class="w-full border rounded-lg px-3 py-2" />
          </div>
          <div>
            <label class="block text-sm text-slate-600 mb-1" data-i18n="lname_th"></label>
            <input id="last_name" class="w-full border rounded-lg px-3 py-2" />
          </div>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="hospital_opt"></label>
          <select id="hospital" class="w-full border rounded-lg px-3 py-2">
            <option value="" data-i18n="select_hospital"></option>
            <option value="Siriraj Hospital" data-i18n="siriraj"></option>
            <option value="Srinagarind Hospital" data-i18n="srinagarind"></option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="hn_label"></label>
          <input id="hospital_id" disabled class="w-full border rounded-lg px-3 py-2 disabled:bg-slate-100 disabled:text-slate-400" />
          <p class="text-xs text-slate-400 mt-1" data-i18n="hn_help"></p>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="password_label"></label>
          <input id="password" type="password" class="w-full border rounded-lg px-3 py-2" required />
          <p class="text-xs text-slate-400 mt-1" data-i18n="password_help"></p>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="reenter_pw"></label>
          <input id="password2" type="password" class="w-full border rounded-lg px-3 py-2" required />
        </div>
        <div>
          <span class="block text-sm text-slate-600 mb-1" data-i18n="shared_q"></span>
          <label class="mr-4"><input type="radio" name="shared" value="yes" checked /> <span data-i18n="yes"></span></label>
          <label><input type="radio" name="shared" value="no" /> <span data-i18n="no"></span></label>
        </div>
        <button id="submitBtn" class="w-full bg-indigo-600 text-white rounded-lg py-2 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed" data-i18n="submit"></button>
      </form>

      <div id="result" class="hidden mt-5 border-t pt-4">
        <p class="text-green-600 font-medium mb-2" data-i18n="reg_success"></p>
        <ul id="resultList" class="text-sm text-slate-700 space-y-1"></ul>
        <p class="mt-3 text-sm font-medium text-amber-600" data-i18n="screenshot_prompt"></p>
        <a href="index.html" class="inline-block mt-3 text-indigo-600 hover:underline" data-i18n="goto_login"></a>
      </div>

      <div id="loginLink" class="mt-4 text-sm">
        <a href="index.html" class="text-indigo-600 hover:underline" data-i18n="goto_login"></a>
      </div>
    </div>
  </main>
</div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', renderFooter);
  window.onLangChange = () => { const f = document.getElementById('hbpFooter'); if (f) f.textContent = t('copyright'); };

  const hospitalEl = document.getElementById('hospital');
  const hnEl = document.getElementById('hospital_id');
  // Hospital ID is only fillable once a hospital is selected.
  hospitalEl.addEventListener('change', () => {
    if (hospitalEl.value) { hnEl.disabled = false; }
    else { hnEl.disabled = true; hnEl.value = ''; }
  });

  function validate(v) {
    if (v.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.email)) return t('v_email_bad');
    if (v.username) {
      if (v.username.includes('@')) return t('v_username_at');
      if (!/[A-Za-z]/.test(v.username)) return t('v_username_letter');
    }
    if (v.hospital_id) {
      if (!v.hospital) return t('v_hn_needhosp');
      if (v.hospital_id.length < 4) return t('v_hn_len');
    }
    if (v.password.length < 8) return t('v_pw_len');
    if (!/[A-Za-z]/.test(v.password) || !/[0-9]/.test(v.password)) return t('v_pw_mix');
    if (v.password !== v.password2) return t('v_pw_match');
    return null;
  }

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const v = {
      email: document.getElementById('email').value.trim(),
      username: document.getElementById('username').value.trim(),
      first_name: document.getElementById('first_name').value.trim(),
      last_name: document.getElementById('last_name').value.trim(),
      hospital: document.getElementById('hospital').value,
      hospital_id: document.getElementById('hospital_id').value.trim(),
      password: document.getElementById('password').value,
      password2: document.getElementById('password2').value,
      shared: document.querySelector('input[name="shared"]:checked').value,
    };
    const err = validate(v);
    if (err) { alert(err); return; }

    btn.disabled = true; // block double-clicks while awaiting
    try {
      const { user } = await api('register', v);
      const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

      // Email + Username always; Hospital / HN / First / Last only when present.
      const rows = [['col_email', user.email || '-']];
      if (user.hospital) rows.push(['col_hospital', user.hospital]);
      if (user.hospital_id) rows.push(['col_hn', user.hospital_id]);
      if (user.first_name) rows.push(['fn_label', user.first_name]);
      if (user.last_name) rows.push(['ln_label', user.last_name]);
      rows.push(['col_username', user.username || '-']);

      let html = rows
        .map(([k, val]) => `<li><span data-i18n="${k}"></span>: <b>${esc(val)}</b></li>`)
        .join('');
      html += `<li>
        <span data-i18n="password"></span>:
        <b id="rPw">••••••••</b>
        <button id="pwToggle" type="button" class="text-indigo-600 hover:underline ml-1"></button>
      </li>`;
      document.getElementById('resultList').innerHTML = html;

      // Password reveal toggle (the password the user just typed).
      const realPw = v.password;
      let shown = false;
      const pwEl = document.getElementById('rPw');
      const pwBtn = document.getElementById('pwToggle');
      const renderPw = () => {
        pwEl.textContent = shown ? realPw : '••••••••';
        pwBtn.textContent = shown ? t('pw_hide') : t('pw_show');
      };
      pwBtn.addEventListener('click', () => { shown = !shown; renderPw(); });

      document.getElementById('result').classList.remove('hidden');
      document.getElementById('regForm').classList.add('hidden');
      document.getElementById('loginLink').classList.add('hidden'); // remove duplicate link
      applyI18n(); // translate the newly injected labels
      renderPw();
    } catch (err) {
      alert(err.message);
      btn.disabled = false;
    }
  });
</script>
