<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home BP — Register</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @media print {
    header, #hbpFooter, #printBtn, #pwToggle { display: none !important; }
  }
</style>
<div class="min-h-screen bg-slate-100 flex flex-col">
  <header class="flex items-center justify-between px-5 py-3 bg-white shadow-sm">
    <h1 class="font-semibold text-indigo-700" data-i18n="app_title_monitor"></h1>
    <button id="langToggle" onclick="toggleLang()" class="text-sm border rounded-lg px-3 py-1 hover:bg-slate-50"></button>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow p-6 my-6">
      <h2 class="text-xl font-semibold mb-5 text-slate-800" data-i18n="register_title"></h2>
      <form id="regForm" class="space-y-3">
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="email_req"></label>
          <input id="email" type="email" class="w-full border rounded-lg px-3 py-2" />
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="username_label"></label>
          <input id="username" class="w-full border rounded-lg px-3 py-2" />
          <p class="text-xs text-slate-400 mt-1" data-i18n="username_help"></p>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm text-slate-600 mb-1" data-i18n="fname_th"></label>
            <input id="first_name" class="w-full border rounded-lg px-3 py-2" />
          </div>
          <div>
            <label class="block text-sm text-slate-600 mb-1" data-i18n="lname_th"></label>
            <input id="last_name" class="w-full border rounded-lg px-3 py-2" />
          </div>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="hospital_opt"></label>
          <select id="hospital" class="w-full border rounded-lg px-3 py-2">
            <option value="" data-i18n="select_hospital"></option>
            <option value="Siriraj Hospital" data-i18n="siriraj"></option>
            <option value="Srinagarind Hospital" data-i18n="srinagarind"></option>
          </select>
        </div>
        <div id="hnField" class="hidden">
          <label class="block text-sm text-slate-600 mb-1" data-i18n="hn_label"></label>
          <input id="hospital_id" class="w-full border rounded-lg px-3 py-2" />
          <p class="text-xs text-slate-400 mt-1" data-i18n="hn_help"></p>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="password_label"></label>
          <input id="password" type="password" class="w-full border rounded-lg px-3 py-2" required />
          <p class="text-xs text-slate-400 mt-1" data-i18n="password_help"></p>
        </div>
        <div>
          <label class="block text-sm text-slate-600 mb-1" data-i18n="reenter_pw"></label>
          <input id="password2" type="password" class="w-full border rounded-lg px-3 py-2" required />
        </div>
        <div>
          <span class="block text-sm text-slate-600 mb-1" data-i18n="shared_q"></span>
          <label class="mr-4"><input type="radio" name="shared" value="yes" checked /> <span data-i18n="yes"></span></label>
          <label><input type="radio" name="shared" value="no" /> <span data-i18n="no"></span></label>
        </div>
        <button id="submitBtn" class="w-full bg-indigo-600 text-white rounded-lg py-2 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed" data-i18n="submit"></button>
      </form>

      <div id="result" class="hidden mt-5 border-t pt-4">
        <p class="text-green-600 font-medium mb-2" data-i18n="reg_success"></p>
        <p id="emailNote" class="hidden text-sm text-green-700 mb-2"></p>
        <ul id="resultList" class="text-sm text-slate-700 space-y-1"></ul>
        <div id="qrBox" class="mt-4 flex flex-col items-center"></div>
        <p class="mt-3 text-sm font-medium text-amber-600" data-i18n="screenshot_prompt"></p>
        <button id="lineLinkBtn2" type="button" class="w-full mt-4 text-white rounded-lg py-2 font-medium hover:brightness-110 disabled:opacity-50" style="background:#06C755" data-i18n="line_link_btn"></button>
        <p id="lineMsg2" class="hidden text-sm mt-2"></p>
        <div class="mt-3 flex items-center gap-4">
          <a href="index.html" class="text-indigo-600 hover:underline" data-i18n="goto_login"></a>
          <button id="printBtn" type="button" class="text-indigo-600 hover:underline" data-i18n="print_btn"></button>
        </div>
      </div>

      <div id="loginLink" class="mt-4 text-sm">
        <a href="index.html" class="text-indigo-600 hover:underline" data-i18n="goto_login"></a>
      </div>

      <div id="lineDone" class="hidden mt-2 text-center">
        <p id="lineDoneMsg"></p>
        <button id="lineContinue" type="button" class="bg-indigo-600 text-white rounded-lg px-5 py-2 hover:bg-indigo-700" data-i18n="line_continue"></button>
        <div class="mt-3"><a href="index.html" class="text-indigo-600 hover:underline" data-i18n="goto_login"></a></div>
      </div>
    </div>
  </main>
</div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', renderFooter);
  window.onLangChange = () => { const f = document.getElementById('hbpFooter'); if (f) f.textContent = t('copyright'); };

  const hospitalEl = document.getElementById('hospital');
  const hnEl = document.getElementById('hospital_id');
  const hnField = document.getElementById('hnField');
  // Hospital ID field is hidden until a hospital is selected.
  hospitalEl.addEventListener('change', () => {
    if (hospitalEl.value) {
      hnField.classList.remove('hidden');
    } else {
      hnField.classList.add('hidden');
      hnEl.value = '';
    }
  });

  // ---- LINE account linking (after registration completes) ----
  const LIFF_ID = '2010745308-dTpWiHuY';
  let regUser = null, regToken = null;

  function gotoHome(u) {
    location.href = u.role === 'admin' ? 'admin.html' : u.role === 'master' ? 'master.html' : 'user.html';
  }

  // Returning from a LINE redirect started on the completion screen: finish linking,
  // then show a clear confirmation (no forced redirect).
  (async () => {
    const pending = sessionStorage.getItem('hbp_line_postreg');
    if (!pending) return;
    sessionStorage.removeItem('hbp_line_postreg');
    const { user, token } = JSON.parse(pending);
    setSession(user, token);
    document.getElementById('regForm').classList.add('hidden');
    document.getElementById('loginLink').classList.add('hidden');
    const done = document.getElementById('lineDone');
    const dmsg = document.getElementById('lineDoneMsg');
    done.classList.remove('hidden');
    document.getElementById('lineContinue').addEventListener('click', () => gotoHome(user));
    applyI18n();
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn() || !liff.getIDToken()) throw new Error('LINE login was not completed');
      await api('line-link', { id_token: liff.getIDToken() });
      dmsg.className = 'text-green-600 font-medium mb-4';
      dmsg.textContent = t('line_link_success');
    } catch (e) {
      dmsg.className = 'text-red-600 mb-4';
      dmsg.textContent = t('line_error') + ': ' + (e.message || e);
    }
  })();

  // Called from the completion screen's "Link LINE account" button.
  async function linkLineAfterRegister() {
    const btn = document.getElementById('lineLinkBtn2');
    const msg = document.getElementById('lineMsg2');
    btn.disabled = true;
    msg.classList.add('hidden');
    setSession(regUser, regToken); // authenticate as the just-created account
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        // Needs LINE authorization -> redirect; we resume + link on return.
        sessionStorage.setItem('hbp_line_postreg', JSON.stringify({ user: regUser, token: regToken }));
        liff.login({ redirectUri: location.href });
        return;
      }
      const idt = liff.getIDToken();
      if (!idt) throw new Error('no LINE ID token (enable the "openid" scope on the LINE channel)');
      await api('line-link', { id_token: idt });
      // Linked — stay on this screen so the details / QR stay visible.
      msg.className = 'text-sm mt-2 text-green-600 font-medium';
      msg.textContent = t('line_link_success');
      msg.classList.remove('hidden');
      btn.classList.add('hidden');
    } catch (e) {
      msg.className = 'text-sm mt-2 text-red-600';
      msg.textContent = t('line_error') + ': ' + (e.message || e);
      msg.classList.remove('hidden');
      btn.disabled = false;
    }
  }

  function validate(v) {
    if (v.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.email)) return t('v_email_bad');
    if (v.username) {
      if (v.username.includes('@')) return t('v_username_at');
      if (!/[A-Za-z]/.test(v.username)) return t('v_username_letter');
      if (/^user/i.test(v.username)) return t('v_username_reserved');
    }
    if (v.hospital_id) {
      if (!v.hospital) return t('v_hn_needhosp');
      if (v.hospital_id.length < 4) return t('v_hn_len');
    }
    if (v.password.length < 8) return t('v_pw_len');
    if (!/[A-Za-z]/.test(v.password) || !/[0-9]/.test(v.password)) return t('v_pw_mix');
    if (v.password !== v.password2) return t('v_pw_match');
    return null;
  }

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const v = {
      email: document.getElementById('email').value.trim(),
      username: document.getElementById('username').value.trim(),
      first_name: document.getElementById('first_name').value.trim(),
      last_name: document.getElementById('last_name').value.trim(),
      hospital: document.getElementById('hospital').value,
      hospital_id: document.getElementById('hospital_id').value.trim(),
      password: document.getElementById('password').value,
      password2: document.getElementById('password2').value,
      shared: document.querySelector('input[name="shared"]:checked').value,
      origin: location.origin, // used to build the QR link in the confirmation e-mail
    };
    const err = validate(v);
    if (err) { alert(err); return; }

    btn.disabled = true; // block double-clicks while awaiting
    try {
      const { user, qr_code, email_sent, token } = await api('register', v);
      regUser = user;
      regToken = token;
      if (email_sent) {
        const n = document.getElementById('emailNote');
        n.textContent = t('email_sent_note');
        n.classList.remove('hidden');
      }
      const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

      // Email + Username always; Hospital / HN / First / Last only when present.
      const rows = [['col_email', user.email || '-']];
      if (user.hospital) rows.push(['col_hospital', user.hospital]);
      if (user.hospital_id) rows.push(['col_hn', user.hospital_id]);
      if (user.first_name) rows.push(['fn_label', user.first_name]);
      if (user.last_name) rows.push(['ln_label', user.last_name]);
      rows.push(['col_username', user.username || '-']);

      let html = rows
        .map(([k, val]) => `<li><span data-i18n="${k}"></span>: <b>${esc(val)}</b></li>`)
        .join('');
      html += `<li>
        <span data-i18n="password"></span>:
        <b id="rPw">••••••••</b>
        <button id="pwToggle" type="button" class="text-indigo-600 hover:underline ml-1"></button>
      </li>`;
      document.getElementById('resultList').innerHTML = html;

      // Password reveal toggle (the password the user just typed).
      const realPw = v.password;
      let shown = false;
      const pwEl = document.getElementById('rPw');
      const pwBtn = document.getElementById('pwToggle');
      const renderPw = () => {
        pwEl.textContent = shown ? realPw : '••••••••';
        pwBtn.textContent = shown ? t('pw_hide') : t('pw_show');
      };
      pwBtn.addEventListener('click', () => { shown = !shown; renderPw(); });

      // Print the details with the password revealed.
      document.getElementById('printBtn').addEventListener('click', () => {
        shown = true;
        renderPw();
        window.print();
      });

      // Link a LINE account to this newly-created account (then log in).
      document.getElementById('lineLinkBtn2').addEventListener('click', linkLineAfterRegister);

      // QR code that opens the QR-login page and auto-fills this account's code.
      const qrBox = document.getElementById('qrBox');
      if (qr_code && window.QRCode) {
        qrBox.innerHTML = `<p class="text-sm font-medium text-slate-700 mb-2" data-i18n="qr_caption"></p><div id="qrCanvas" class="bg-white p-2 rounded"></div>`;
        const qrUrl = `${location.origin}/qr-login.html?uid=${user.id}&code=${encodeURIComponent(qr_code)}`;
        new QRCode(document.getElementById('qrCanvas'), { text: qrUrl, width: 200, height: 200 });
      }

      document.getElementById('result').classList.remove('hidden');
      document.getElementById('regForm').classList.add('hidden');
      document.getElementById('loginLink').classList.add('hidden'); // remove duplicate link
      applyI18n(); // translate the newly injected labels
      renderPw();
    } catch (err) {
      alert(err.message);
      btn.disabled = false;
    }
  });
</script>
