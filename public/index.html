<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home BP — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .hbp-bg {
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(99,102,241,0.28), transparent 60%),
      radial-gradient(900px 500px at 110% 20%, rgba(6,182,212,0.20), transparent 55%),
      linear-gradient(160deg, #05060a 0%, #0b1020 55%, #05060a 100%);
  }
  .hbp-card { background: rgba(17,20,32,0.72); backdrop-filter: blur(10px); }
</style>
<div class="min-h-screen hbp-bg flex flex-col text-slate-100">
  <header class="flex items-center justify-between px-5 py-3">
    <h1 class="font-semibold text-lg tracking-tight text-white" data-i18n="app_title_monitor"></h1>
    <button id="langToggle" onclick="toggleLang()" class="text-sm border border-white/20 rounded-lg px-3 py-1 hover:bg-white/10"></button>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm hbp-card rounded-2xl shadow-2xl border border-white/10 p-6">
      <h2 class="text-xl font-semibold mb-5" data-i18n="login_title"></h2>
      <form id="loginForm" class="space-y-4">
        <input id="identifier" data-i18n-ph="id_email_username" class="w-full bg-white/5 border border-white/15 rounded-lg px-3 py-2 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <input id="password" type="password" data-i18n-ph="password" class="w-full bg-white/5 border border-white/15 rounded-lg px-3 py-2 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <button class="w-full bg-indigo-600 text-white rounded-lg py-2 font-medium hover:bg-indigo-500" data-i18n="login_btn"></button>
      </form>
      <div class="flex justify-between mt-4 text-sm">
        <a href="#" id="forgotLink" class="text-indigo-300 hover:underline" data-i18n="forgot_pw"></a>
        <a href="register.html" class="text-indigo-300 hover:underline" data-i18n="go_register"></a>
      </div>
      <div class="mt-3">
        <a href="line-login.html" class="block text-sm text-white rounded-lg px-4 py-2 text-center font-medium hover:brightness-110" style="background:#06C755" data-i18n="line_login_btn"></a>
      </div>

      <div id="forgotPanel" class="hidden mt-5 border-t border-white/10 pt-4">
        <p class="text-sm text-slate-300 mb-2" data-i18n="forgot_prompt"></p>
        <input id="forgotEmail" type="email" data-i18n-ph="email" class="w-full bg-white/5 border border-white/15 rounded-lg px-3 py-2 mb-2 placeholder-slate-400" />
        <div class="flex gap-2">
          <button id="forgotSend" class="flex-1 bg-indigo-600 text-white rounded-lg py-2 hover:bg-indigo-500" data-i18n="send"></button>
          <button id="forgotCancel" class="flex-1 border border-white/20 rounded-lg py-2 hover:bg-white/10" data-i18n="cancel"></button>
        </div>
        <p id="forgotMsg" class="text-sm mt-2"></p>
      </div>
    </div>
  </main>
</div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script>
  const existing = getUser();
  if (existing) location.href = existing.role === 'admin' ? 'admin.html' : existing.role === 'master' ? 'master.html' : 'user.html';
  document.addEventListener('DOMContentLoaded', renderFooter);
  window.onLangChange = () => { const f = document.getElementById('hbpFooter'); if (f) f.textContent = t('copyright'); };

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      const { user, token } = await api('login', {
        identifier: document.getElementById('identifier').value,
        password: document.getElementById('password').value,
      });
      setSession(user, token);
      location.href = user.role === 'admin' ? 'admin.html' : user.role === 'master' ? 'master.html' : 'user.html';
    } catch (err) {
      alert(err.message);
    }
  });

  const panel = document.getElementById('forgotPanel');
  document.getElementById('forgotLink').addEventListener('click', (e) => { e.preventDefault(); panel.classList.toggle('hidden'); });
  document.getElementById('forgotCancel').addEventListener('click', () => panel.classList.add('hidden'));
  document.getElementById('forgotSend').addEventListener('click', async () => {
    const msg = document.getElementById('forgotMsg');
    try {
      const r = await api('forgot-password', { email: document.getElementById('forgotEmail').value });
      msg.className = 'text-sm mt-2 text-green-400';
      msg.textContent = r.sent
        ? (getLang() === 'th' ? 'ส่งรหัสผ่านใหม่ไปที่อีเมลแล้ว' : 'A new password was e-mailed to you.')
        : (getLang() === 'th' ? 'รหัสผ่านใหม่: ' : 'New password: ') + r.password;
    } catch (err) {
      msg.className = 'text-sm mt-2 text-red-400';
      msg.textContent = err.message;
    }
  });
</script>
